<!-- US Requirements View -->
<div id="us_reqs" class="view">
    <h3 style="margin-bottom: 20px;">US Requirements Overview</h3>
    <div class="dashboard-grid">
        <div class="card">
            <h3>US W2 Positions</h3>
            <div class="value" id="kpi-us-w2">0</div>
        </div>
        <div class="card">
            <h3>US C2C Positions</h3>
            <div class="value" id="kpi-us-c2c">0</div>
        </div>
        <div class="card">
            <h3>Active US Requirements</h3>
            <div class="value" id="kpi-us-active">0</div>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Req ID</th>
                    <th>Title & Client</th>
                    <th>Location</th>
                    <th>Post Type</th>
                    <th>Bill Rate</th>
                    <th>Pay Rate</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="us-req-table">
            </tbody>
        </table>
    </div>
</div>
