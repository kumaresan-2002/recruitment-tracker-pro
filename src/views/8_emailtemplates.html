<div id="emailtemplates" class="view">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
        <div>
            <h2 style="font-size:1.5rem; font-weight:700; letter-spacing:-0.03em;">📧 Email Templates</h2>
            <p style="font-size:0.85rem; color:var(--text-light); margin-top:4px;">Customizable templates for candidate communication. Click any card to edit & preview.</p>
        </div>
        <button class="btn" onclick="openSendEmailModal(null, null)">✉️ Compose Custom Email</button>
    </div>

    <!-- Tab Navigation -->
    <div style="display:flex; gap:10px; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:10px;">
        <button id="btn-tab-templates" class="btn btn-sm" style="border-radius:20px;" onclick="switchEmailTab('templates')">Email Templates</button>
        <button id="btn-tab-campaigns" class="btn btn-sm btn-outline" style="border-radius:20px;" onclick="switchEmailTab('campaigns')">Drip Campaigns</button>
    </div>

    <!-- Templates Tab -->
    <div id="email-templates-tab">
        <!-- Template Library Cards -->
        <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); margin-bottom:28px;" id="template-card-grid">
            <!-- Populated via JS -->
        </div>

    <!-- Template Editor -->
    <div class="card" id="template-editor-panel" >
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3 style="font-size:1rem; text-transform:none; letter-spacing:0;" id="template-editor-title">Edit Template</h3>
            <button onclick="closeTemplateEditor()" style="background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text-light);">✕</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div>
                <div class="form-group">
                    <label>Template Name</label>
                    <input type="text" id="tpl_name" style="width:100%;">
                </div>
                <div class="form-group">
                    <label>Subject Line</label>
                    <input type="text" id="tpl_subject" style="width:100%;">
                </div>
                <div class="form-group">
                    <label>Body (use <code>{{candidate_name}}</code>, <code>{{job_title}}</code>, <code>{{company_name}}</code>, <code>{{interview_date}}</code>)</label>
                    <textarea id="tpl_body" rows="12" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.9rem; resize:vertical;" oninput="previewTemplate()"></textarea>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="saveTemplate()">💾 Save Template</button>
                    <button class="btn btn-outline" onclick="resetTemplateToDefault()">↺ Reset to Default</button>
                </div>
            </div>
            <div>
                <div class="form-group">
                    <label>Preview (sample data substitution)</label>
                    <div id="tpl_preview" style="background:var(--bg-light); border:1px solid var(--border); border-radius:8px; padding:16px; min-height:300px; font-size:0.9rem; line-height:1.7; white-space:pre-wrap; color:var(--text-dark);"></div>
                </div>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button class="btn btn-outline" onclick="copyTemplateToClipboard()">📋 Copy to Clipboard</button>
                    <button class="btn btn-outline" onclick="openMailtoLink()">📤 Open in Gmail</button>
                </div>
            </div>
        </div>
        </div>
    </div>
    <!-- Close email-templates-tab -->

    <!-- Campaigns Tab -->
    <div id="email-campaigns-tab" >
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0;">Active Campaigns</h3>
            <div>
                <button class="btn btn-sm btn-outline" style="margin-right:10px;" onclick="simulateCampaignDay()">⏩ Simulate Next Day</button>
                <button class="btn btn-sm" onclick="openCampaignBuilder()">+ New Campaign</button>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Campaign Name</th>
                        <th>Steps</th>
                        <th>Active Enrollees</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="campaigns-table">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Campaign Builder Modal -->
    <div id="campaignBuilderModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Build Drip Campaign</h2>
                <span class="close-btn" onclick="closeModal('campaignBuilderModal')">&times;</span>
            </div>
            <form onsubmit="saveCampaign(event)">
                <div class="form-group">
                    <label>Campaign Name</label>
                    <input type="text" id="cmp_name" required style="width:100%;">
                </div>
                
                <div style="background:var(--bg-light); padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid var(--border);">
                    <h4 style="margin-top:0; color:var(--primary);">Step 1: Initial Outreach</h4>
                    <label style="font-size:0.8rem;">Select Template:</label>
                    <select id="cmp_step1_template" required style="width:100%; margin-bottom:10px;"></select>
                </div>
                
                <div style="background:var(--bg-light); padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid var(--border);">
                    <h4 style="margin-top:0; color:var(--primary);">Step 2: Follow Up</h4>
                    <label style="font-size:0.8rem;">Wait (Days):</label>
                    <input type="number" id="cmp_step2_wait" min="1" max="14" value="3" style="width:60px; margin-bottom:10px;">
                    <label style="font-size:0.8rem; display:block;">Select Template:</label>
                    <select id="cmp_step2_template" required style="width:100%; margin-bottom:10px;"></select>
                </div>
                
                <button type="submit" class="btn" style="width:100%;">Save Campaign</button>
            </form>
        </div>
    </div>
</div>
