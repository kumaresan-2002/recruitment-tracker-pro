<!-- India Requirements View -->
<div id="in_reqs" class="view">
    <h3 style="margin-bottom: 20px;">India Requirements Overview</h3>
    <div class="dashboard-grid">
        <div class="card">
            <h3>Permanent Positions</h3>
            <div class="value" id="kpi-in-perm">0</div>
        </div>
        <div class="card">
            <h3>Contract Positions</h3>
            <div class="value" id="kpi-in-contract">0</div>
        </div>
        <div class="card">
            <h3>Active India Requirements</h3>
            <div class="value" id="kpi-in-active">0</div>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Req ID</th>
                    <th>Title & Client</th>
                    <th>Location</th>
                    <th>Employment Type</th>
                    <th>Max Budget</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="in-req-table">
            </tbody>
        </table>
    </div>
</div>
