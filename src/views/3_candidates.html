<div id="candidates" class="view">
    
    <!-- Candidate Sub-folders (Sub-tabs) -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-sm" id="btn-can-all" type="button" onclick="switchCandidateTab('All')">All Candidates</button>
            <button class="btn btn-sm btn-outline" id="btn-can-us" type="button" onclick="switchCandidateTab('US')">US Candidates</button>
            <button class="btn btn-sm btn-outline" id="btn-can-in" type="button" onclick="switchCandidateTab('IN')">India Candidates</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-sm" id="btn-view-list" onclick="toggleCandidateView('list')">List View</button>
            <button class="btn btn-sm btn-outline" id="btn-view-kanban" onclick="toggleCandidateView('kanban')">Kanban Board</button>
        </div>
    </div>

    <div id="candidate-list-view">
        <div style="margin-bottom: 20px; display: flex; gap: 15px; align-items: center;">
            <input type="text" id="searchCan" placeholder="Search candidates..." onkeyup="updateAllViews()" style="padding: 8px; border: 1px solid var(--border); border-radius: 4px; width: 300px;">
            <select id="filterStage" onchange="updateAllViews()" style="padding: 8px; border: 1px solid var(--border); border-radius: 4px;">
                <option value="All">All Stages</option>
                <option value="Sourced">Sourced</option>
                <option value="Screened">Screened</option>
                <option value="Submitted to Client">Submitted to Client</option>
                <option value="Interview Scheduled">Interview Scheduled</option>
                <option value="Offer Released">Offer Released</option>
                <option value="Joined">Joined</option>
                <option value="Talent Pool">Talent Pool</option>
            </select>
            
            <div style="margin-left: 20px; padding-left: 20px; border-left: 1px solid var(--border); display: flex; gap: 10px; align-items: center;">
                <select id="bulkActionStage" style="padding: 8px; border: 1px solid var(--border); border-radius: 4px;">
                    <option value="">-- Bulk Update Stage --</option>
                    <option value="Screened">Screened</option>
                    <option value="Submitted to Client">Submitted to Client</option>
                    <option value="Interview Scheduled">Interview Scheduled</option>
                    <option value="Offer Released">Offer Released</option>
                    <option value="Talent Pool">Talent Pool</option>
                </select>
                <button class="btn btn-sm btn-outline" onclick="applyBulkAction()">Apply</button>
                <button class="btn btn-sm" onclick="openMassEmailModal()" style="background: var(--info); color: white; border: none;">📧 Send Mass Email</button>
            </div>

            <div style="margin-left: auto; display: flex; gap: 10px;">
                <button class="btn btn-sm" onclick="openModal('aiResumeParseModal')" style="background:var(--accent); color:white; border:none;">🤖 AI Parse Resume</button>
                <button class="btn btn-sm btn-outline" onclick="exportCandidatesCSV()" style="color:var(--primary); border-color:var(--primary);">📥 Export CSV</button>
                <button class="btn btn-sm btn-outline" onclick="openModal('importCSVModal')" style="color:var(--success); border-color:var(--success);">📤 Import CSV</button>
                <button class="btn btn-sm" onclick="openModal('candidateModal')">+ Add Candidate</button>
            </div>
        </div>
        
        <div class="table-container">
            <table>
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="selectAllCands" onclick="toggleAllCheckboxes(this)"></th>
                    <th>Candidate ID</th>
                    <th>Name & Email</th>
                    <th>Req ID</th>
                    <th>Source</th>
                    <th>Current Stage</th>
                    <th>Last Updated</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="candidate-table">
                <!-- Populated via JS -->
            </tbody>
        </table>
    </div>
    </div>
    
    <div id="candidate-kanban-view" style="display: none; padding-top: 10px;">
        <div class="kanban-board" id="kanban-board-container" style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; height: 600px;"></div></div></div>
