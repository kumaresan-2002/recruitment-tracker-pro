<div id="careersPortal" class="view" style="padding-top: 10px;">
    <div style="background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 40px; border-radius: 16px; text-align: center; margin-bottom: 30px;">
        <h2 style="margin: 0 0 10px; font-size: 2rem;">🌐 We're Hiring!</h2>
        <p style="margin: 0; font-size: 1.1rem; opacity: 0.9;">Explore open positions and apply directly. We'll be in touch shortly.</p>
    </div>
    <div style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center;">
        <input type="text" id="careerSearch" placeholder="🔍 Search by title, location or type..." onkeyup="renderCareersPortal()" style="padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; width: 350px; font-size: 0.95rem;">
    </div>
    <div id="careers-job-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
        <!-- Populated by JS -->
    </div>
</div>
